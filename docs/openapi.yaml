openapi: 3.0.0
info:
  title: Gemelo Cognitivo API
  description: API para la orquestación de agentes IA (Groq) en proyectos de aprendizaje
  version: 1.0.0
servers:
  - url: http://localhost:8000
    description: Servidor de desarrollo Local
paths:
  /auth/register:
    post:
      summary: Registro de usuario
      responses:
        '200':
          description: Token JWT
  /auth/login:
    post:
      summary: Login de usuario
      responses:
        '200':
          description: Token JWT
  /api/profile:
    post:
      summary: Generar perfil de competencias
      description: Recibe el cuestionario y llama al Profiling Agent.
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: competency_profile.json generado
  /api/roadmap:
    post:
      summary: Generar Roadmap
      description: Llama al Planning Agent, Explanatory Agent y MlPredictor.
      responses:
        '200':
          description: roadmap.json devuelto al front
  /api/roadmap/{id}/block/{blockId}:
    patch:
      summary: Actualizar estado de bloque
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: blockId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Ok
  /api/roadmap/{id}/alternatives:
    get:
      summary: Ver trayectoria A y B
      responses:
        '200':
          description: Trayectorias devueltas
  /api/admin/metrics:
    get:
      summary: Métricas del panel admin
      responses:
        '200':
          description: Stats de uso MLD
